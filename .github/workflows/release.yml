name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - run: cargo build --locked --release

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/awiki dist/awiki
          tar -C dist -czf "awiki-${GITHUB_REF_NAME}-linux-x86_64.tar.gz" awiki

      - uses: softprops/action-gh-release@v2
        with:
          files: awiki-${{ github.ref_name }}-linux-x86_64.tar.gz
